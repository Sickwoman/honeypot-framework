# Optimized Logstash Pipeline Configuration

input {
  file {
    path => "/var/log/cowrie/cowrie.log"
    start_position => "beginning"
    codec => json
    tags => ["cowrie"]
    # Performance optimization
    stat_interval => 10  # Check file every 10 seconds
    discover_interval => 15
  }

  file {
    path => "/var/tmp/opencanary.log"
    start_position => "beginning"
    codec => json
    tags => ["opencanary"]
    stat_interval => 10
    discover_interval => 15
  }
}

filter {
  # Optimize with consolidated conditionals
  if "cowrie" in [tags] {
    mutate {
      add_fields => {
        "honeypot_type" => "cowrie_ssh"
        "service" => "SSH"
        "environment" => "production"
      }
      # Remove unnecessary fields to reduce memory
      remove_field => ["host", "path"]
    }
    
    # Redact sensitive data BEFORE other processing
    mutate {
      gsub => [
        "logdata.PASSWORD", ".*", "***REDACTED***",
        "logdata.USERNAME", "^(.{1}).*(.{1})$", "\1***\2"
      ]
    }
  }

  if "opencanary" in [tags] {
    mutate {
      add_fields => {
        "honeypot_type" => "opencanary"
        "environment" => "production"
      }
      remove_field => ["host", "path"]
    }
    
    # Redact credentials
    mutate {
      gsub => [
        "logdata.PASSWORD", ".*", "***REDACTED***",
        "logdata.USERNAME", ".*", "***REDACTED***"
      ]
    }
  }

  # Consolidate timestamp handling
  if ![timestamp] {
    mutate {
      add_field => { "[@metadata][index_name]" => "honeypot-%{+YYYY.MM.dd}" }
    }
  }

  # GeoIP enrichment with caching
  if [src_ip] and [src_ip] != "" {
    geoip {
      source => "src_ip"
      target => "geoip"
      # Cache size optimization
      cache_size => 5000
    }
  }
}

output {
  # Elasticsearch output with batching for performance
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    
    # Credentials
    user => "logstash_system"
    password => "${LOGSTASH_PASSWORD}"
    
    # SSL/TLS
    ssl => true
    ssl_certificate_verification => true
    cacert => "/usr/share/logstash/config/certs/ca.crt"
    
    # Performance optimization
    batch_size => 1000          # Batch 1000 events
    flush_interval => 5         # Flush every 5 seconds
    workers => 4                # Number of output workers
    
    # Retry strategy
    max_retries => 3
    retry_on_conflict => 1
  }

  # File backup output (async, non-blocking)
  file {
    path => "/var/log/logstash/honeypot-%{+YYYY-MM-dd}.log"
    codec => json
    # Only for debugging - disable in production
    # (Comment out to disable file output)
    # message_format => "%{message}"
  }

  # Console output for monitoring (verbose=true when needed)
  # Uncomment for debugging only
  # stdout {
  #   codec => rubydebug
  # }
}

