# Logstash Security Configuration

input {
  file {
    path => "/var/log/cowrie/cowrie.log"
    start_position => "beginning"
    codec => json
    tags => ["cowrie"]
  }

  file {
    path => "/var/tmp/opencanary.log"
    start_position => "beginning"
    codec => json
    tags => ["opencanary"]
  }
}

filter {
  # Sanitize sensitive data before indexing
  if "cowrie" in [tags] {
    mutate {
      add_field => { "honeypot_type" => "cowrie_ssh" }
      add_field => { "service" => "SSH" }
      # Mask passwords
      gsub => [ "logdata.PASSWORD", ".*", "***REDACTED***" ]
    }
  }

  if "opencanary" in [tags] {
    mutate {
      add_field => { "honeypot_type" => "opencanary" }
      # Mask credentials
      gsub => [ "logdata.PASSWORD", ".*", "***REDACTED***" ]
      gsub => [ "logdata.USERNAME", ".+", "***REDACTED***" ]
    }
  }

  # Add timestamp
  mutate {
    add_field => { "[@metadata][index_name]" => "honeypot-%{+YYYY.MM.dd}" }
  }
}

output {
  # Output to Elasticsearch with authentication
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    
    # Elasticsearch credentials
    user => "logstash_system"
    password => "${LOGSTASH_PASSWORD}"
    
    # SSL/TLS settings
    ssl => true
    ssl_certificate_verification => true
    cacert => "/usr/share/logstash/config/certs/ca.crt"
  }

  # Also log to file for backup
  file {
    path => "/var/log/logstash/honeypot.log"
    codec => json
  }

  # Console output for debugging
  stdout {
    codec => rubydebug
  }
}
