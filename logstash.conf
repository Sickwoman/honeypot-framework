input {
  file {
    path => "/var/log/cowrie/cowrie.log"
    start_position => "beginning"
    codec => json
    tags => ["cowrie"]
  }

  file {
    path => "/var/tmp/opencanary.log"
    start_position => "beginning"
    codec => json
    tags => ["opencanary"]
  }
}

filter {
  if "cowrie" in [tags] {
    mutate {
      add_field => { "honeypot_type" => "cowrie_ssh" }
      add_field => { "service" => "SSH" }
    }
    
    if [logtype] == 2000 {
      mutate {
        add_field => { "event_type" => "login_attempt" }
      }
    }
    if [logtype] == 2001 {
      mutate {
        add_field => { "event_type" => "connection" }
      }
    }
  }

  if "opencanary" in [tags] {
    mutate {
      add_field => { "honeypot_type" => "opencanary" }
    }
    
    if [logtype] == 2000 {
      mutate {
        add_field => { "event_type" => "login_attempt" }
      }
    }
    if [logtype] == 2001 {
      mutate {
        add_field => { "event_type" => "connection" }
      }
    }
    if [logtype] == 3003 {
      mutate {
        add_field => { "event_type" => "http_request" }
        add_field => { "service" => "HTTP" }
      }
    }
    if [logtype] == 9003 {
      mutate {
        add_field => { "event_type" => "database_connection" }
        add_field => { "service" => "MySQL" }
      }
    }
  }

  mutate {
    add_field => { "[@metadata][index_name]" => "honeypot-%{+YYYY.MM.dd}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
  }

  stdout {
    codec => rubydebug
  }
}
